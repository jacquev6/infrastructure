apiVersion: v1
kind: ConfigMap
metadata:
  name: public-fanout
data:
  nginx.conf: |
    user nginx;
    worker_processes 1;

    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] $host "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" "$http_x_forwarded_for"';
      access_log /var/log/nginx/access.log main;

      sendfile on;

      keepalive_timeout 65;

      server {
        server_name dyn.vincent-jacques.net;
        listen 80;  # @todo 443 ssl

        location /turkshead {
          proxy_pass http://draw-turks-head-demo:80/;
        }
      }

      # @todo Redirect www. to main domain for vjnet, jv6net, and ecvfr
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-fanout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: public-fanout
  template:
    metadata:
      labels:
        app: public-fanout
    spec:
      containers:
        - name: public-fanout
          image: nginx:1.19.10
          ports:
            - containerPort: 80  # @todo 443
          volumeMounts:
            - name: etc-nginx
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: etc-nginx
          configMap:
            name: public-fanout
---
apiVersion: v1
kind: Service
metadata:
  name: public-fanout
spec:
  type: NodePort
  selector:
    app: public-fanout
  ports:
    - port: 80  # @todo 443
      nodePort: 30081  # @todo 30443, and redirect WAN's 443
