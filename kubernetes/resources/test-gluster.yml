apiVersion: v1
kind: Pod
metadata:
  name: gluster-volume
spec:
  containers:
    - name: gluster-volume
      image: nginx
      volumeMounts:
      - mountPath: "/mnt/test-1"
        name: test-1
  volumes:
    - name: test-1
      glusterfs:
        endpoints: gluster
        path: test-1

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: gluster-pv
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 1G
  glusterfs:
    endpoints: gluster
    path: test-2
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gluster-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1G
  volumeName: gluster-pv
---
apiVersion: v1
kind: Pod
metadata:
  name: gluster-pvc
spec:
  containers:
    - name: gluster-pvc
      image: nginx
      volumeMounts:
      - mountPath: "/mnt/test-2"
        name: test-2
  volumes:
    - name: test-2
      persistentVolumeClaim:
        claimName: gluster-pvc

---

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gluster-sc
provisioner: kubernetes.io/glusterfs
parameters:
  resturl: "http://127.0.0.1:8081"
  clusterid: "630372ccdc720a92c681fb928f27b53f"
  restauthenabled: "true"
  restuser: "admin"
  secretNamespace: "default"
  secretName: "heketi-secret"
  gidMin: "40000"
  gidMax: "50000"
  volumetype: "replicate:2"
