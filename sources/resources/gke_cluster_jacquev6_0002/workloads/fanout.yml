apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: fanout
  annotations:
    kubernetes.io/ingress.global-static-ip-name: "fanout"
spec:
  # Current quota: 15 backends (https://console.cloud.google.com/iam-admin/quotas?project=jacquev6-0001)
  rules:
    - host: dyn.vincent-jacques.net
      http:
        paths:
          - path: /turkshead
            backend:
              serviceName: draw-turks-head-demo
              servicePort: 80
    - host: splight.fr
      http:
        paths:
          - path: /*
            backend:
              serviceName: splight-public
              servicePort: 80
    - host: admin.splight.fr
      http:
        paths:
          - path: /*
            backend:
              serviceName: splight-admin
              servicePort: 80
          - path: /preview/*
            backend:
              serviceName: splight-preview
              servicePort: 80
          - path: /preview
            backend:
              serviceName: splight-preview
              servicePort: 80
    - host: api-v1.splight.fr
      http:
        paths:
          - path: /graphql
            backend:
              serviceName: splight-api-v1
              servicePort: 80
