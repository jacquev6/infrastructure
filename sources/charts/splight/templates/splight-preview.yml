apiVersion: apps/v1
kind: Deployment
metadata:
  name: splight-preview
spec:
  selector:
    matchLabels:
      app: splight-preview
  replicas: 1
  template:
    metadata:
      labels:
        app: splight-preview
    spec:
      containers:
        - name: splight-preview
          image: jacquev6/splight:{{ .Values.version }}.public-frontend.preview
          ports:
            - containerPort: 80
          env:
            - name: SPLIGHT_API_URL
              value: "https://api-v1.splight.fr/graphql"
          resources:
            requests:
              cpu: 10m
---
apiVersion: v1
kind: Service
metadata:
  name: splight-preview
spec:
  type: NodePort
  selector:
    app: splight-preview
  ports:
    - port: 80
