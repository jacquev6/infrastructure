apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.baseName }}-api
spec:
  selector:
    matchLabels:
      app: {{ .Values.baseName }}-api
  replicas: 1
  template:
    metadata:
      labels:
        app: {{ .Values.baseName }}-api
    spec:
      containers:
        - name: {{ .Values.baseName }}-api
          image: jacquev6/splight:{{ .Values.version }}.api
          ports:
            - containerPort: 80
          env:
            - name: SPLIGHT_MONGODB_URL
              value: "mongodb://{{ .Values.baseName }}-mongo:27017/"
          resources:
            requests:
              cpu: 10m
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.baseName }}-api
spec:
  type: NodePort
  selector:
    app: {{ .Values.baseName }}-api
  ports:
    - port: 80
