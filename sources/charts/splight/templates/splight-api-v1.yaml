apiVersion: apps/v1
kind: Deployment
metadata:
  name: splight-api-v1
spec:
  selector:
    matchLabels:
      app: splight-api-v1
  replicas: 1
  template:
    metadata:
      labels:
        app: splight-api-v1
    spec:
      containers:
        - name: splight-api-v1
          image: jacquev6/splight:{{ .Values.version }}.api
          ports:
            - containerPort: 80
          env:
            - name: SPLIGHT_MONGODB_URL
              value: "mongodb://splight-mongo:27017/"
          resources:
            requests:
              cpu: 10m
---
apiVersion: v1
kind: Service
metadata:
  name: splight-api-v1
spec:
  type: NodePort
  selector:
    app: splight-api-v1
  ports:
    - port: 80
