apiVersion: apps/v1
kind: Deployment
metadata:
  name: splight-admin
spec:
  selector:
    matchLabels:
      app: splight-admin
  replicas: 1
  template:
    metadata:
      labels:
        app: splight-admin
    spec:
      containers:
        - name: splight-admin
          image: jacquev6/splight:{{ .Values.version }}.admin-frontend
          ports:
            - containerPort: 80
          env:
            - name: SPLIGHT_API_URL
              value: "https://api-v1.splight.fr/graphql"
          resources:
            requests:
              cpu: 10m
---
apiVersion: v1
kind: Service
metadata:
  name: splight-admin
spec:
  type: NodePort
  selector:
    app: splight-admin
  ports:
    - port: 80
