apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.baseName }}-preview
spec:
  selector:
    matchLabels:
      app: {{ .Values.baseName }}-preview
  replicas: 1
  template:
    metadata:
      labels:
        app: {{ .Values.baseName }}-preview
    spec:
      containers:
        - name: {{ .Values.baseName }}-preview
          image: jacquev6/splight:{{ .Values.version }}.public-frontend.preview
          ports:
            - containerPort: 80
          env:
            - name: SPLIGHT_API_URL
              value: "{{ .Values.apiPublicUrl }}"
          resources:
            requests:
              cpu: 10m
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.baseName }}-preview
spec:
  type: NodePort
  selector:
    app: {{ .Values.baseName }}-preview
  ports:
    - port: 80
