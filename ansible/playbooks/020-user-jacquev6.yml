- hosts: all
  become: yes
  tasks:
    - name: Add user 'jacquev6'
      user:
        name: jacquev6
        create_home: yes
        shell: /bin/bash
        comment: Vincent Jacques
    - name: Add SSH authorized key for user 'jacquev6'
      authorized_key:
        user: jacquev6
        key: "ssh-rsa  jacquev6"
    - name: Enable password-less sudo for user 'jacquev6'
      lineinfile:
        path: /etc/sudoers.d/010_jacquev6-nopasswd
        line: 'jacquev6 ALL=(ALL) NOPASSWD: ALL'
        create: yes
        mode: 0440
        validate: visudo -c -f %s
    # @todo Remove this task when it's applied on group 'persisted'
    - name: Remove SSH authorized key to maskarade 'doorman' as 'jacquev6'
      authorized_key:
        user: jacquev6
        key: "ssh-rsa  doorman"
        state: absent
