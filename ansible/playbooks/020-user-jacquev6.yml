- hosts: all
  become: yes
  tasks:
    - name: Add user 'jacquev6'
      user:
        name: jacquev6
        create_home: yes
        shell: /bin/bash
        comment: Vincent Jacques
    - name: Add SSH authorized key for user 'jacquev6'
      authorized_key:
        user: jacquev6
        key: "ssh-rsa  jacquev6"
    - name: Enable password-less sudo for user 'jacquev6'
      lineinfile:
        path: /etc/sudoers.d/010_jacquev6-nopasswd
        line: 'jacquev6 ALL=(ALL) NOPASSWD: ALL'
        create: yes
        mode: 0440
        validate: visudo -c -f %s

- hosts: all
  become: yes
  tasks:
    # @todo Make this a loop over inventory
    - name: Add idee to known_hosts for user 'jacquev6'
      known_hosts:
        path: ~jacquev6/.ssh/known_hosts
        name: idee.home.jacquev6.net
        key: "idee.home.jacquev6.net ssh-rsa "
    - name: Add doorman to known_hosts for user 'jacquev6'
      known_hosts:
        path: ~jacquev6/.ssh/known_hosts
        name: doorman.home.jacquev6.net
        key: "doorman.home.jacquev6.net ssh-rsa "
    - name: Add probe to known_hosts for user 'jacquev6'
      known_hosts:
        path: ~jacquev6/.ssh/known_hosts
        name: probe.home.jacquev6.net
        key: "probe.home.jacquev6.net,192.168.1.69 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBEc0IbUXrMNlN3PVLveLSPJOD3oeAWUA+Tgboe9QQkLyrU4Nrb2GI1uqRqZDLF17K9i1lojR6v1CsP2u2RIIFKg="
    - name: Add eeepc to known_hosts for user 'jacquev6'
      known_hosts:
        path: ~jacquev6/.ssh/known_hosts
        name: eeepc.home.jacquev6.net
        key: "eeepc.home.jacquev6.net,192.168.1.67 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBMJ+nR/4r1xL12HW+mp9E+FVyqIymRvuNC8MPyDhXBmx1QRdmcxifHX6BYZnAhyRO+/4a+SYYUKm9kWYk/+rxq0="
    - name: Fix ownership of known_hosts for user 'jacquev6'
      file:
        path: ~jacquev6/.ssh/known_hosts
        owner: jacquev6
        group: jacquev6
