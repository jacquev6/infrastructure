- hosts: all
  become: yes
  tasks:
    - name: Add user 'jacquev6'
      user:
        name: jacquev6
        create_home: yes
        shell: /bin/bash
        comment: Vincent Jacques
    - name: Add SSH authorized key for user 'jacquev6'
      authorized_key:
        user: jacquev6
        key: "ssh-rsa  jacquev6"
    - name: Enable password-less sudo for user 'jacquev6'
      lineinfile:
        path: /etc/sudoers.d/010_jacquev6-nopasswd
        line: 'jacquev6 ALL=(ALL) NOPASSWD: ALL'
        create: yes
        mode: 0440
        validate: visudo -c -f %s

- hosts: all
  become: yes
  tasks:
    # @todo Remove this play once run on all machines
    - name: Remove known_hosts for user 'jacquev6'
      file:
        path: ~jacquev6/.ssh/known_hosts
        state: absent
