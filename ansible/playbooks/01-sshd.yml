- hosts: all
  tasks:
    - name: add vincent@home key to .ssh/authorized_keys
      authorized_key:
        user: jacquev6
        key: "ssh-rsa  vincent@home"
    - name: add doorman key to .ssh/authorized_keys
      authorized_key:
        user: jacquev6
        key: "ssh-rsa  doorman"
- hosts: all
  become: yes
  tasks:
    - name: disable password authentication
      lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: '^(#\s*)?PasswordAuthentication '
        line: "PasswordAuthentication no"
      notify: restart sshd
    - name: disable root login
      lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: '^(#\s*)?PermitRootLogin '
        line: "PermitRootLogin no"
      notify: restart sshd
    - name: disable empty password login
      lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: '^(#\s*)?PermitEmptyPasswords '
        line: "PermitEmptyPasswords no"
      notify: restart sshd
  handlers:
    - name: restart sshd
      service:
        name: sshd
        state: restarted
