- hosts: media
  become: yes
  tasks:
    - name: Install bindfs
      apt:
        name:
          - bindfs
        state: latest
    - name: Mount Media
      mount:
        src: /dev/sda2
        fstype: ntfs
        opts: nofail
        path: /media/Media
        state: mounted
    - name: Mount MongoDB data with appropriate uid:gid
      mount:
        src: /media/Media/MyVideoCollection/.mongo
        fstype: fuse.bindfs
        # mongodb user's id in mongo image
        opts: force-user=999,force-group=999
        path: /home/jacquev6/Data/Hacking/MyVideoCollection/MongoDB
        state: mounted
    - name: Run My Video Collection
      docker_compose:
        state: present
        project_name: my-video-collection
        pull: yes
        remove_orphans: yes
        scale:
          rq-worker: 4
        definition:
          version: "3"
          services:
            redis:
              image: redis:alpine
              restart: always
            mongo:
              image: mongo:4.2.6
              restart: always
              volumes:
                - /home/jacquev6/Data/Hacking/MyVideoCollection/MongoDB:/data/db
            graphql-api:
              image: registry.jacquev6.net/my-video-collection:latest
              restart: always
              volumes:
                - /media/Media/MyVideoCollection:/mvc-collection
              working_dir: /my-video-collection/graphql-api
              environment:
                FLASK_RUN_HOST: "0.0.0.0"
                MVC_COLLECTION_PATH: /mvc-collection
                MVC_REDIS_HOST: redis
                MVC_MONGO_HOST: mongo
              depends_on:
                - redis
                - mongo
              command:
                - flask
                - run
              ports:
                - "8000:5000"
            rq-worker:
              image: registry.jacquev6.net/my-video-collection:latest
              restart: always
              volumes:
                - /media/Media/MyVideoCollection:/mvc-collection
              working_dir: /my-video-collection/graphql-api
              environment:
                MVC_COLLECTION_PATH: /mvc-collection
                MVC_REDIS_HOST: redis  # @todo Remove (currently required only because of poor modularisation of graphql-api)
                MVC_MONGO_HOST: mongo
              depends_on:
                - redis
                - mongo
              command:
                - rq
                - worker
                - --url
                - redis://redis
