- hosts: idee
  become: yes
  tasks:
    - name: Install exfat
      apt:
        name:
          - exfat-fuse
        state: latest
    - name: Mount Black for MongoDb
      mount:
        path: /media/BlackForMongoDb
        src: /dev/sdc2
        fstype: exfat
        state: mounted
        # mongodb user's id in mongo image
        opts: nofail,uid=999,gid=999
    - name: Run My Video Collection
      docker_compose:
        state: present
        project_name: my-video-collection
        pull: yes
        remove_orphans: yes
        scale:
          rq-worker: 4
        definition:
          version: "3"
          services:
            redis:
              image: redis:alpine
            mongo:
              image: mongo:4.2.6
              volumes:
                - /media/BlackForMongoDb/my-video-collection/.mongo:/data/db
            graphql-api:
              image: registry.jacquev6.net/my-video-collection:latest
              volumes:
                - /media/BlackForMongoDb/my-video-collection:/mvc-collection
              working_dir: /my-video-collection/graphql-api
              environment:
                FLASK_RUN_HOST: "0.0.0.0"
                MVC_COLLECTION_PATH: /mvc-collection
                MVC_REDIS_HOST: redis
                MVC_MONGO_HOST: mongo
              depends_on:
                - redis
                - mongo
              command:
                - flask
                - run
              ports:
                - "8000:5000"
            rq-worker:
              image: registry.jacquev6.net/my-video-collection:latest
              volumes:
                - /media/BlackForMongoDb/my-video-collection:/mvc-collection
              working_dir: /my-video-collection/graphql-api
              environment:
                MVC_COLLECTION_PATH: /mvc-collection
                MVC_REDIS_HOST: redis  # @todo Remove (currently required only because of poor modularisation of graphql-api)
                MVC_MONGO_HOST: mongo
              depends_on:
                - redis
                - mongo
              command:
                - rq
                - worker
                - --url
                - redis://redis
