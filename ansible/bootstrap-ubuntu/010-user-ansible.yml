# This bootstrap playbook's second play removes the user
# used for its first play. So, it's NOT idempotent.
# It must be run exactly once on a fresh Ubuntu install.
# See README for the few manual steps required beforehand
- hosts: all
  become: yes
  vars:
    ansible_user: user
    ansible_ssh_pass: password
    ansible_become_password: password
  tasks:
    - name: Add user 'ansible'
      user:
        name: ansible
        append: yes
        groups:
          - sudo
          - users
        create_home: yes
        shell: /bin/bash
        comment: Ansible
    - name: Add SSH authorized key for user 'ansible'
      authorized_key:
        user: ansible
        exclusive: yes
        key: "{{ lookup('file', '/infra/ansible/ansible.id_rsa.pub') }}"
    - name: Enable password-less sudo for user 'ansible'
      lineinfile:
        path: /etc/sudoers.d/010_ansible-nopasswd
        line: 'ansible ALL=(ALL) NOPASSWD: ALL'
        create: yes
        mode: 0440
        validate: visudo -c -f %s
- hosts: all
  become: yes
  tasks:
    - name: Kill last processes of user 'user'
      command: killall --user user
    - name: Remove user 'user'
      user:
        name: user
        state: absent
    - name: Remove home for user 'user'
      file:
        path: /home/user
        state: absent
