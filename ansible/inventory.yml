all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_user: ansible
    ansible_ssh_private_key_file: ansible.id_rsa

  children:

    # Groups with one machines used as convenient short aliases
    idee:
      hosts:
        idee.home.jacquev6.net:
    media:
      hosts:
        media.home.jacquev6.net:
    pi4b4_1:
      hosts:
        pi4b4-1.home.jacquev6.net:
    pi4b4_2:
      hosts:
        pi4b4-2.home.jacquev6.net:
    pi4b4_3:
      hosts:
        pi4b4-3.home.jacquev6.net:
    pi4b4_4:
      hosts:
        pi4b4-4.home.jacquev6.net:

    # Groups used as tags to decide which machines get which playbooks

    ## Pets vs. cattle
    pets:
      children:
        idee:
        media:

    cattle:
      children:
        pi4b4_1:
        pi4b4_2:
        pi4b4_3:
        pi4b4_4:

    ## hardware
    pi:
      children:
        pi400:  # Raspberry Pi 400
          children:
            media:
        pi4b4:  # Raspberry PI 4 model B, with 4GB RAM
          children:
            pi4b4_1:
            pi4b4_2:
            pi4b4_3:
            pi4b4_4:

    pc:
      children:
        idee:  # AMD64 with a big GPU

    gpu:
      children:
        idee:

    ## Operating system
    ubuntu:
      children:
        idee:
        media:
        cattle:
      vars:
        bootstrap_user: ubuntu
        bootstrap_password: ubuntu

    ## Software
    containers:
      children:
        docker:
          children:
            idee:
        kubernetes:
          children:
            cattle:

    gluster:
      children:
        pi4b4_1:
          vars:
            small_gluster_brick: 3b4c1835-a5fb-2249-9a65-1e9c8159a4f6
        pi4b4_2:
          vars:
            small_gluster_brick: e41be4b0-cfcd-b446-8063-ed609818c7d7
        pi4b4_3:
          vars:
            small_gluster_brick: 7fcda896-f8c5-c742-8f00-de3650a41070
        pi4b4_4:
          vars:
            small_gluster_brick: 1bbf155a-7a81-d344-8e49-3c12df2ffeaf
